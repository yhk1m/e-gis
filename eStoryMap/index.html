<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- CSP: 외부 리소스를 필요한 출처로만 제한(추적 비콘·내부망 프로빙 차단). script/style은 Vite·OL 호환 위해 unsafe-inline
         (실질 XSS 방어는 DOMPurify). 허용: 이미지=모든 https(임의 웹 이미지 URL 지원)+data:/blob:, Supabase(REST+realtime), YouTube 임베드. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; frame-src https://www.youtube-nocookie.com https://www.youtube.com https://e-gis.kr; connect-src 'self' ws://localhost:* http://localhost:* https://lufbotdmhgsuvejlytgh.supabase.co wss://lufbotdmhgsuvejlytgh.supabase.co; font-src 'self' data:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>e-GIS</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- 저장된 테마를 첫 페인트 전에 적용(다크→라이트 깜빡임 방지). 기본은 다크. -->
    <script>
      try { if (localStorage.getItem('egis-theme') === 'light') document.documentElement.dataset.theme = 'light'; } catch (e) {}
    </script>
    <style id="pdf-page-rule"></style><!-- PDF 저장 직전 @page 크기 주입(보고서 A4 / 발표 16:9) -->
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app-tabs">
      <button id="tab-egis" class="app-tab" type="button">e-GIS</button>
      <button id="tab-estory" class="app-tab active" type="button">e-GIStory</button>
    </div>
    <div id="app" inert>
      <header id="toolbar">
        <strong class="brand"><span class="brand-e">e</span>-GIStory</strong>
        <button id="btn-projects" type="button" title="저장하고 프로젝트 목록으로 (다른 프로젝트 열기 · 로그아웃)">🗂 프로젝트</button>
        <button id="btn-import" type="button">.egis 열기</button>
        <button id="btn-folder" type="button">저장 폴더 열기</button>
        <button id="btn-present" type="button" title="발표 모드로 보기 (Esc로 종료)">▶ 발표</button>
        <button id="btn-slidepdf" type="button" title="발표 슬라이드를 PDF로 저장 (16:9)">📊 발표 PDF</button>
        <label id="layout-select-label" title="발표 텍스트 레이아웃 (프로젝트 전체)">레이아웃
          <select id="layout-select">
            <option value="band">밴드</option>
            <option value="panel">패널</option>
            <option value="card">카드</option>
          </select>
        </label>
        <label id="pos-select-label" title="레이아웃 위치 (프로젝트 전체)">위치
          <select id="pos-select">
            <option value="left">왼쪽</option>
            <option value="right">오른쪽</option>
            <option value="top">위</option>
            <option value="bottom">아래</option>
          </select>
        </label>
        <label id="legend-toggle-label" title="지도 위 범례 표시"><input type="checkbox" id="legend-toggle" checked /> 범례</label>
        <label id="cloud-toggle-label" title="로그인하면 이 스토리맵을 클라우드에도 자동 저장합니다"><input type="checkbox" id="cloud-toggle" disabled /> 클라우드 동기화</label>
        <span id="save-status"></span>
        <span id="status"></span>
        <button id="btn-theme" type="button" title="테마 전환">☀️</button>
      </header>
      <div id="workspace">
        <aside id="sidebar">
          <section class="panel">
            <h2 class="panel-title">소스</h2>
            <div id="source-panel"></div>
          </section>
          <section class="panel">
            <h2 class="panel-title">페이지</h2>
            <div id="page-list"></div>
          </section>
        </aside>
        <div id="map-stage">
          <div id="slide-canvas">
            <div id="map"><div id="legend" hidden></div></div>
            <div id="slide-preview"></div>
          </div>
          <div id="map-tools">
            <button id="btn-capture" type="button" title="현재 화면을 이 페이지의 카메라로 저장">📷 이 위치로 캡처</button>
            <button id="btn-cam-all" type="button" title="현재 지도 위치를 모든 슬라이드에 적용">📌 모든 슬라이드에 이 위치</button>
            <button id="btn-cam-sync" type="button" title="다른 슬라이드의 위치를 이 슬라이드로 가져오기">🔗 위치 가져오기</button>
            <div id="cam-sync-pop" hidden></div>
          </div>
        </div>
        <aside id="content-sidebar">
          <section class="panel">
            <h2 class="panel-title">콘텐츠</h2>
            <div id="content-panel"></div>
          </section>
        </aside>
      </div>
    </div>
    <div id="start-screen"></div>
    <div id="presentation"></div>
    <div id="report" hidden></div>
    <div id="egis-pane"><webview id="egis-webview" allowpopups></webview></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
